<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐧 swarm chat</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117; color: #e6edf3;
    display: flex; flex-direction: column; height: 100dvh; max-width: 780px;
    margin: 0 auto; padding: 0 16px;
  }
  header {
    display: flex; align-items: center; gap: 10px; padding: 14px 0;
    border-bottom: 1px solid #21262d; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
  select, button, label {
    background: #161b22; color: #e6edf3; border: 1px solid #30363d;
    border-radius: 8px; padding: 6px 10px; font-size: 13px;
  }
  label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #status { font-size: 12px; color: #7d8590; width: 100%; }
  #log { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; }
  .user { align-self: flex-end; background: #1f6feb; }
  .assistant { align-self: flex-start; background: #161b22; border: 1px solid #21262d; }
  .meta { font-size: 11px; color: #7d8590; margin-top: 6px; }
  .error { align-self: center; color: #f85149; font-size: 13px; }
  form { display: flex; gap: 8px; padding: 12px 0 16px; border-top: 1px solid #21262d; }
  textarea {
    flex: 1; resize: none; background: #161b22; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 10px; padding: 10px 12px;
    font: inherit; min-height: 44px; max-height: 160px;
  }
  form button { padding: 0 18px; background: #238636; border-color: #2ea043; cursor: pointer; font-weight: 600; }
  form button:disabled { opacity: .5; cursor: wait; }
</style>
</head>
<body>
<header>
  <h1>🐧 swarm chat</h1>
  <select id="conversations" title="past conversations"><option value="">history…</option></select>
  <select id="model">
    <option value="hermes">hermes (local, free)</option>
    <option value="claude">claude</option>
    <option value="kimi">kimi k2.6</option>
  </select>
  <label><input type="checkbox" id="fallback" checked> fallback</label>
  <button id="reset" type="button">new chat</button>
  <button id="del" type="button" title="delete this conversation">🗑</button>
  <div id="status">checking backends…</div>
</header>
<div id="log"></div>
<form id="form">
  <textarea id="input" placeholder="Message the swarm…" rows="1"></textarea>
  <button id="send" type="submit">Send</button>
</form>
<script>
const log = document.getElementById("log");
const form = document.getElementById("form");
const input = document.getElementById("input");
const send = document.getElementById("send");
const modelSel = document.getElementById("model");
const fallbackBox = document.getElementById("fallback");
const statusEl = document.getElementById("status");

let conversationId = localStorage.getItem("conversationId");

function add(role, text, meta) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  if (meta) {
    const m = document.createElement("div");
    m.className = "meta";
    m.textContent = meta;
    div.appendChild(m);
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function addError(text) {
  const div = document.createElement("div");
  div.className = "error";
  div.textContent = "⚠ " + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function loadHealth() {
  try {
    const h = await (await fetch("/api/health")).json();
    const b = h.compute?.backends ?? {};
    const parts = [
      "hermes " + (b.hermes?.reachable ? "✓" : "✗"),
      "claude " + (b.claude?.ready ? "✓" : "✗"),
      "kimi " + (b.kimi?.ready ? "✓" : "✗"),
    ];
    statusEl.textContent = h.ok === false ? (h.error ?? "backend offline") : parts.join(" · ");
  } catch { statusEl.textContent = "backend offline"; }
}

async function loadHistory() {
  if (!conversationId) return;
  try {
    const data = await (await fetch("/api/conversations/" + conversationId)).json();
    for (const m of data.messages ?? []) {
      add(m.role, m.content, m.role === "assistant" && m.model ? "via " + m.model : null);
    }
  } catch {}
}

const convSel = document.getElementById("conversations");

async function loadConversationList() {
  try {
    const data = await (await fetch("/api/conversations")).json();
    convSel.innerHTML = '<option value="">history…</option>';
    for (const c of data.conversations ?? []) {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = (c.title || c.id.slice(0, 8)) + " (" + c.message_count + ")";
      if (c.id === conversationId) opt.selected = true;
      convSel.appendChild(opt);
    }
  } catch {}
}

convSel.addEventListener("change", () => {
  if (!convSel.value) return;
  conversationId = convSel.value;
  localStorage.setItem("conversationId", conversationId);
  log.innerHTML = "";
  loadHistory();
});

document.getElementById("del").addEventListener("click", async () => {
  if (!conversationId) return;
  await fetch("/api/conversations/" + conversationId, { method: "DELETE" }).catch(() => {});
  conversationId = null;
  localStorage.removeItem("conversationId");
  log.innerHTML = "";
  loadConversationList();
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  input.value = "";
  send.disabled = true;
  add("user", message);
  const pending = add("assistant", "…");
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        conversationId,
        message,
        model: modelSel.value,
        fallback: fallbackBox.checked,
      }),
    });
    const data = await res.json();
    pending.remove();
    if (!res.ok) { addError(data.error ?? "request failed"); }
    else {
      conversationId = data.conversationId;
      localStorage.setItem("conversationId", conversationId);
      add("assistant", data.reply, "via " + data.model);
      loadConversationList();
    }
  } catch {
    pending.remove();
    addError("network error");
  } finally {
    send.disabled = false;
    input.focus();
  }
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

document.getElementById("reset").addEventListener("click", () => {
  conversationId = null;
  localStorage.removeItem("conversationId");
  log.innerHTML = "";
  input.focus();
});

loadHealth();
loadHistory();
loadConversationList();
setInterval(loadHealth, 30000);
</script>
</body>
</html>
